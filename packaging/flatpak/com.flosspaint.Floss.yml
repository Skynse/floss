app-id: com.flosspaint.Floss
runtime: org.freedesktop.Platform
runtime-version: "24.08"
sdk: org.freedesktop.Sdk
command: floss
finish-args:
  - --share=ipc
  - --socket=x11
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --filesystem=home
  - --talk-name=org.freedesktop.portal.FileChooser
  - --talk-name=org.freedesktop.portal.OpenURI
  - --talk-name=org.freedesktop.portal.Settings
modules:
  - name: floss
    buildsystem: simple
    build-commands:
      - install -d /app/lib/floss
      - cp -a publish/. /app/lib/floss/
      - install -Dm755 floss-launcher.sh /app/bin/floss
      - install -Dm644 com.flosspaint.Floss.desktop /app/share/applications/com.flosspaint.Floss.desktop
      - install -Dm644 com.flosspaint.Floss.metainfo.xml /app/share/metainfo/com.flosspaint.Floss.metainfo.xml
      - install -Dm644 icon.png /app/share/icons/hicolor/256x256/apps/com.flosspaint.Floss.png
      - install -Dm644 application-x-floss.xml /app/share/mime/packages/application-x-floss.xml
      - update-desktop-database /app/share/applications || true
      - update-mime-database /app/share/mime || true
    sources:
      - type: dir
        path: publish
        dest: publish
      - type: file
        path: floss-launcher.sh
      - type: file
        path: com.flosspaint.Floss.desktop
      - type: file
        path: com.flosspaint.Floss.metainfo.xml
      - type: file
        path: icon.png
      - type: file
        path: application-x-floss.xml
