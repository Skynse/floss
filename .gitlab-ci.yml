# GitLab CI — build Floss installers and upload to Cloudflare R2 on tags.
#
# CI variables (optional):
#   FLOSS_VERSION — override csproj Version at pack time
#
# CI variables (required for deploy:cdn on tags):
#   R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY, R2_ACCOUNT_ID, R2_BUCKET, CDN_PUBLIC_URL
#
# Release: git tag v0.1.0-beta.2 && git push origin --tags
# See notes/release-automation.md
# Windows job needs a Windows runner (GitLab SaaS: tag saas-windows-medium-amd64,
# or your own shell runner with .NET SDK installed).
# macOS job needs a macOS runner (GitLab SaaS: tag saas-macos-medium-m1).

stages:
  - test
  - pack
  - deploy

variables:
  DOTNET_ROLL_FORWARD: LatestMajor
  DOTNET_NOLOGO: "true"
  DOTNET_CLI_TELEMETRY_OPTOUT: "true"
  NUGET_PACKAGES: "$CI_PROJECT_DIR/.nuget/packages"

.dotnet_cache: &dotnet_cache
  cache:
    key: dotnet-$CI_COMMIT_REF_SLUG
    paths:
      - .nuget/packages/

test:
  stage: test
  image: mcr.microsoft.com/dotnet/sdk:10.0
  <<: *dotnet_cache
  script:
    - dotnet restore
    - dotnet test tests/Floss.App.Tests/Floss.App.Tests.csproj -c Release --no-restore
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

.tag_version: &tag_version
  - |
    if [ -n "${CI_COMMIT_TAG:-}" ]; then
      export FLOSS_VERSION="${CI_COMMIT_TAG#v}"
      echo "Release version: $FLOSS_VERSION"
    fi

pack:linux:
  stage: pack
  image: mcr.microsoft.com/dotnet/sdk:10.0
  <<: *dotnet_cache
  before_script:
    - apt-get update -qq && apt-get install -y -qq fuse libfuse2 flatpak flatpak-builder
    - flatpak remote-add --if-not-exists --system flathub https://dl.flathub.org/repo/flathub.flatpakrepo
    - *tag_version
  script:
    - dotnet tool restore
    - chmod +x packaging/velopack/pack.sh packaging/flatpak/build.sh packaging/portable/pack.sh
    - ./packaging/velopack/pack.sh linux-x64
    - FLATPAK_SCOPE=system ./packaging/flatpak/build.sh
    - ./packaging/portable/pack.sh all
  artifacts:
    name: floss-linux-$CI_COMMIT_REF_SLUG
    expire_in: 90 days
    paths:
      - artifacts/velopack/linux-x64-beta/*.AppImage
      - artifacts/flatpak/com.flosspaint.Floss.flatpak
      - artifacts/portable/*.zip
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
    - when: manual
      allow_failure: true

pack:windows:
  stage: pack
  tags:
    - saas-windows-medium-amd64
  <<: *dotnet_cache
  before_script:
    - dotnet tool restore
    - *tag_version
  script:
    - packaging/velopack/pack.ps1 win-x64
  artifacts:
    name: floss-win-x64-$CI_COMMIT_REF_SLUG
    expire_in: 90 days
    paths:
      - artifacts/velopack/win-x64-beta/*Setup.exe
      - artifacts/velopack/win-x64-beta/*Portable.zip
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
    - when: manual
      allow_failure: true

pack:macos:
  stage: pack
  tags:
    - saas-macos-medium-m1
  <<: *dotnet_cache
  before_script:
    - dotnet tool restore
    - *tag_version
  script:
    - chmod +x packaging/velopack/pack.sh
    - ./packaging/velopack/pack.sh osx-arm64
  artifacts:
    name: floss-macos-arm64-$CI_COMMIT_REF_SLUG
    expire_in: 90 days
    paths:
      - artifacts/velopack/osx-arm64-beta/*.dmg
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
    - when: manual
      allow_failure: true

# Upload pack artifacts to Cloudflare R2 on version tags.
# GitLab CI variables: R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY, R2_ACCOUNT_ID, R2_BUCKET, CDN_PUBLIC_URL
deploy:cdn:
  stage: deploy
  image: mcr.microsoft.com/dotnet/sdk:10.0
  needs:
    - job: pack:linux
      artifacts: true
    - job: pack:windows
      artifacts: true
      optional: true
    - job: pack:macos
      artifacts: true
      optional: true
  before_script:
    - apt-get update -qq && apt-get install -y -qq awscli
    - chmod +x packaging/release/upload-cdn.sh
    - export FLOSS_VERSION="${CI_COMMIT_TAG#v}"
  script:
    - ./packaging/release/upload-cdn.sh
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/
  environment:
    name: production
    url: https://cdn.flosspaint.com/downloads/version.json
