# GitLab CI — build Floss installers on Linux (all platforms) and upload to Gumroad on tags.
#
# CI variables (optional):
#   FLOSS_VERSION — override csproj Version at pack time
#
# CI variables (required for deploy:gumroad on tags):
#   GUMROAD_ACCESS_TOKEN, GUMROAD_PRODUCT_ID
#
# Release: git tag v0.1.0-beta.2 && git push origin --tags
# See notes/release-automation.md
#
# pack:all runs on Linux only:
#   Linux AppImage + Flatpak (Velopack / flatpak)
#   Windows + macOS portable zips (dotnet cross-publish from Linux)

stages:
  - pack
  - deploy

variables:
  DOTNET_ROLL_FORWARD: LatestMajor
  DOTNET_NOLOGO: "true"
  DOTNET_CLI_TELEMETRY_OPTOUT: "true"
  NUGET_PACKAGES: "$CI_PROJECT_DIR/.nuget/packages"

.dotnet_cache: &dotnet_cache
  cache:
    key: dotnet-$CI_COMMIT_REF_SLUG
    paths:
      - .nuget/packages/

.tag_version: &tag_version
  - |
    if [ -n "${CI_COMMIT_TAG:-}" ]; then
      export FLOSS_VERSION="${CI_COMMIT_TAG#v}"
      echo "Release version: $FLOSS_VERSION"
    fi

pack:all:
  stage: pack
  image: debian:bookworm
  <<: *dotnet_cache
  before_script:
    - apt-get update -qq
    - apt-get install -y -qq --no-install-recommends ca-certificates curl wget zip genisoimage libfuse2 fuse3 flatpak flatpak-builder bubblewrap
    - curl -fsSL https://dot.net/v1/dotnet-install.sh -o /tmp/dotnet-install.sh
    - bash /tmp/dotnet-install.sh --channel 10.0 --install-dir /usr/share/dotnet
    - export DOTNET_ROOT=/usr/share/dotnet
    - export PATH="$DOTNET_ROOT:$PATH"
    - dotnet --version
    - flatpak remote-add --if-not-exists --system flathub https://dl.flathub.org/repo/flathub.flatpakrepo
    - *tag_version
  script:
    - dotnet tool restore
    - chmod +x packaging/velopack/pack.sh packaging/flatpak/build.sh packaging/portable/pack.sh packaging/macos/pack-dmg.sh
    - ./packaging/velopack/pack.sh linux-x64
    - FLATPAK_SCOPE=system ./packaging/flatpak/build.sh
    - ./packaging/portable/pack.sh all
  artifacts:
    name: floss-$CI_COMMIT_REF_SLUG
    expire_in: 90 days
    paths:
      - artifacts/velopack/linux-x64-beta/*.AppImage
      - artifacts/flatpak/com.flosspaint.Floss.flatpak
      - artifacts/portable/FlossPaint-win-x64-beta-portable.zip
      - artifacts/macos/*.dmg
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
      allow_failure: true
    - when: manual
      allow_failure: true

deploy:gumroad:
  stage: deploy
  image: debian:bookworm-slim
  needs:
    - job: pack:all
      artifacts: true
  before_script:
    - apt-get update -qq && apt-get install -y -qq curl ca-certificates
    - chmod +x packaging/release/upload-gumroad.sh
    - export FLOSS_VERSION="${CI_COMMIT_TAG#v}"
  script:
    - ./packaging/release/upload-gumroad.sh
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/
  environment:
    name: production
    url: $GUMROAD_PRODUCT_URL
